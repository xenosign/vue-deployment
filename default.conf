server {
    listen 80;
    server_name vue.tetz.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vue.tetz.org;

    ssl_certificate /etc/letsencrypt/live/vue.tetz.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vue.tetz.org/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}